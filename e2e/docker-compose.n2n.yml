services:
  cardano-node:
    image: ghcr.io/intersectmbo/cardano-node:10.7.1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rm -rf /data/genesis /data/db /data/node.sock
        mkdir -p /data/genesis /data/db
        cp -R /genesis/. /data/genesis/
        chmod 600 /data/genesis/delegate-keys/*
        start_time=$$(date -u -d "+2 seconds" +%Y-%m-%dT%H:%M:%SZ)
        start_epoch=$$(date -u -d "$$start_time" +%s)
        jq --arg start_time "$$start_time" '.systemStart = $$start_time' /data/genesis/shelley-genesis.json > /tmp/shelley-genesis.json
        jq --argjson start_epoch "$$start_epoch" '.startTime = $$start_epoch' /data/genesis/byron-genesis.json > /tmp/byron-genesis.json
        mv /tmp/shelley-genesis.json /data/genesis/shelley-genesis.json
        mv /tmp/byron-genesis.json /data/genesis/byron-genesis.json
        exec /usr/local/bin/cardano-node run \
          --config /data/genesis/node-config.json \
          --topology /data/genesis/topology.json \
          --database-path /data/db \
          --socket-path /data/node.sock \
          --host-addr 0.0.0.0 \
          --port 3001 \
          --shelley-kes-key /data/genesis/delegate-keys/delegate1.kes.skey \
          --shelley-vrf-key /data/genesis/delegate-keys/delegate1.vrf.skey \
          --shelley-operational-certificate /data/genesis/delegate-keys/delegate1.opcert
    volumes:
      - node-data:/data
      - ../e2e-test/genesis:/genesis:ro
    healthcheck:
      test: ["CMD", "test", "-S", "/data/node.sock"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s

  cardano-utxo:
    image: cardano-utxo:e2e
    depends_on:
      cardano-node:
        condition: service_healthy
    volumes:
      - node-data:/data:ro
    command:
      - "--node-name"
      - "cardano-node"
      - "--node-port"
      - "3001"
      - "--network"
      - "devnet"
      - "--db-path"
      - "/tmp/e2e-db"
      - "--api-port"
      - "8080"
      - "--genesis-file"
      - "/data/genesis/shelley-genesis.json"

  e2e-test:
    image: curlimages/curl:latest
    depends_on:
      cardano-utxo:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for cardano-utxo API (N2N)..."
        for i in $(seq 1 60); do
          if curl -sf http://cardano-utxo:8080/ready 2>/dev/null; then
            echo ""
            echo "API is ready!"
            echo "Checking sync status..."
            curl -sf http://cardano-utxo:8080/ready | head -c 500
            echo ""
            echo "N2N E2E TEST PASSED"
            exit 0
          fi
          echo "  attempt $$i/60 - not ready yet"
          sleep 5
        done
        echo "N2N E2E TEST FAILED - API never became ready"
        exit 1

volumes:
  node-data:
