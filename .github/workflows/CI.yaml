name: CI

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build executable
        run: nix build .#cardano-utxo --quiet
      - name: Build e2e-tests
        run: nix build .#e2e-tests --quiet
      - name: Build docker image
        run: nix build .#docker-image -o output-docker-image --quiet
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardano-utxo-image
          path: output-docker-image
      - name: Build AppImage
        run: nix bundle --bundler github:ralismark/nix-appimage .#cardano-utxo -o cardano-utxo.AppImage --quiet
      - name: Upload appImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardano-utxo-appImage
          path: cardano-utxo.AppImage
      - name: Build rpm artifact
        run: nix bundle --bundler github:NixOS/bundlers#toRPM .#cardano-utxo -o cardano-utxo.rpm --quiet
      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardano-utxo-rpm
          path: cardano-utxo.rpm
      - name: Build deb artifact
        run: nix bundle --bundler github:NixOS/bundlers#toDEB .#cardano-utxo -o cardano-utxo.deb --quiet
      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardano-utxo-deb
          path: cardano-utxo.deb
  unit:
    name: Run unit Tests
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run Tests
        run: nix shell .#unit-tests nixpkgs#zstd nixpkgs#gnutar --quiet -c unit-tests
  database:
    name: Run database Tests
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run Tests
        run: nix shell .#database-tests nixpkgs#zstd nixpkgs#gnutar --quiet -c database-tests
  bench:
    name: Run Benchmarks
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run Benchmarks
        run: nix run .#bench --quiet
  formatting:
    name: Check code formatting
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Check Formatting
        run: |
          nix develop --quiet -c just format
          if ! git diff --exit-code --quiet; then
            echo "Code formatting is out of date. Please run 'just format' and commit the changes."
            exit 1
          fi
  hlint:
    name: HLint
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run HLint
        run: nix develop --quiet -c just hlint
  e2e:
    name: N2C E2E test
    needs: build
    runs-on: nixos
    env:
      PATH: /run/current-system/sw/bin:/usr/bin:/bin
    steps:
      - uses: actions/checkout@v4
      - name: Download docker image
        uses: actions/download-artifact@v4
        with:
          name: cardano-utxo-image
          path: output-docker-image
      - name: Cleanup stale containers
        run: docker compose -p e2e-n2c -f e2e/docker-compose.yml down -v --remove-orphans 2>/dev/null || true
      - name: Load and tag docker image
        run: |
          image_file=$(find output-docker-image -type f | head -1)
          loaded=$(docker load < "$image_file" | sed 's/Loaded image: //')
          echo "Loaded: $loaded"
          docker image tag "$loaded" cardano-utxo:e2e
          docker images
      - name: Run E2E test
        run: |
          docker compose -p e2e-n2c -f e2e/docker-compose.yml up \
            --force-recreate \
            --abort-on-container-exit \
            --exit-code-from e2e-test
      - name: Cleanup
        if: always()
        run: docker compose -p e2e-n2c -f e2e/docker-compose.yml down -v
  e2e-n2n:
    name: N2N E2E test
    needs: build
    runs-on: nixos
    env:
      PATH: /run/current-system/sw/bin:/usr/bin:/bin
    steps:
      - uses: actions/checkout@v4
      - name: Download docker image
        uses: actions/download-artifact@v4
        with:
          name: cardano-utxo-image
          path: output-docker-image
      - name: Cleanup stale containers
        run: docker compose -p e2e-n2n -f e2e/docker-compose.n2n.yml down -v --remove-orphans 2>/dev/null || true
      - name: Load and tag docker image
        run: |
          image_file=$(find output-docker-image -type f | head -1)
          loaded=$(docker load < "$image_file" | grep 'Loaded image:' | sed 's/Loaded image: //')
          echo "Loaded: $loaded"
          docker image tag "$loaded" cardano-utxo:e2e
          docker images
      - name: Run N2N E2E test
        run: |
          docker compose -p e2e-n2n -f e2e/docker-compose.n2n.yml up \
            --force-recreate \
            --abort-on-container-exit \
            --exit-code-from e2e-test
      - name: Cleanup
        if: always()
        run: docker compose -p e2e-n2n -f e2e/docker-compose.n2n.yml down -v
  swagger:
    # check that the swagger file is up to date
    name: Check Swagger documentation
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Check Swagger
        run: |
          nix develop --quiet -c just update-swagger
          if ! git diff --exit-code --quiet docs/assets/swagger.json; then
            echo "Swagger documentation is out of date. Please run 'just update-swagger' and commit the changes."
            exit 1
          fi
